<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VIEW3D - Tech Gallery</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Roboto+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- Model Viewer -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <script type="module" crossorigin src="/VIEW3D/assets/index-NMfQL30t.js"></script>
    <link rel="stylesheet" crossorigin href="/VIEW3D/assets/index-Bcc_nYq1.css">
  </head>
  <body>
    <div class="tech-grid-overlay"></div>
    
    <div class="app-container">
      <header>
        <div class="header-line"></div>
        <h1 class="logo">VIEW3D <span class="version">v1.0</span></h1>
        <p class="subtitle">PROJECT VISUALIZATION TERMINAL</p>
      </header>

      <main id="app">
        <div id="gallery" class="gallery-stack">
          <!-- Items will be injected here -->
        </div>
      </main>

      <section class="admin-section">
        <div class="admin-header">
          <button id="toggle-admin">SYSTEM CONFIG (ADMIN)</button>
        </div>
        <div id="admin-panel" class="admin-panel hidden">
          <h2>ADD NEW PROJECT</h2>
          <form id="add-project-form">
            <div class="form-group">
              <label>TITLE</label>
              <input type="text" id="p-title" placeholder="EX: BALCÃO ALPHA" required>
            </div>
            <div class="form-group">
              <label>DESCRIPTION</label>
              <textarea id="p-desc" placeholder="DESCRIÇÃO DO PROJETO..." required></textarea>
            </div>
            <div class="form-group">
              <label>MEASURES</label>
              <input type="text" id="p-measures" placeholder="120x60x110cm" required>
            </div>
            <div class="form-group">
              <label>GLB FILE (3D)</label>
              <input type="file" id="p-glb" accept=".glb">
              <small>OU URL:</small>
              <input type="text" id="p-glb-url" placeholder="https://...">
            </div>
            <div class="form-group">
              <label>MEASURE IMAGE</label>
              <input type="file" id="p-img" accept="image/*">
              <small>OU URL:</small>
              <input type="text" id="p-img-url" placeholder="https://...">
            </div>
            <button type="submit" class="submit-btn">REGISTER PROJECT</button>
          </form>
        </div>
      </section>

      <footer>
        <p class="terminal-footer">STATUS: ONLINE | LOCAL_HOST: 5173 | REPO: VIEW3D</p>
      </footer>
    </div>

    <!-- Fullscreen Overlay -->
    <div id="fullscreen-overlay" class="fullscreen-overlay hidden">
      <div class="fs-controls">
        <button id="close-fs" class="fs-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="fs-viewer-container" id="fs-container">
        <!-- Model will be moved here -->
      </div>
    </div>

  </body>
</html>
